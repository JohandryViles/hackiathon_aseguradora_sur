name: SonarQube Cloud

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: Analyze with SonarQube Cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Sonar secret
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${{ secrets.SONAR_TOKEN }}" ] || (echo "Missing SONAR_TOKEN secret" && exit 1)
          echo "SONAR_TOKEN detected."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage (non-blocking)
        run: bun run test --coverage || true

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
